# 生产部署：只跑应用容器，MySQL/Redis/Nginx 使用宝塔本机
version: '3.9'

services:
  wecom-ops-console:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wecom-ops-console
    restart: always
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./docs/system_teaching:/app/docs/system_teaching
      # 阿里云 RDS SSL CA 证书（生产连 habitilitydb 必须，参考 .env.production.example 的 CRM_PROD_DB_SSL_PATH）
      - ./certs/aliyun:/app/certs/aliyun:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port = os.environ.get('PORT', '8000'); urllib.request.urlopen('http://127.0.0.1:' + port + '/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: wecom-qdrant
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
