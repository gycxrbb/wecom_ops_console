# 生产部署：只跑应用容器，MySQL/Redis/Nginx 使用宝塔本机
version: '3.9'

services:
  wecom-ops-console:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wecom-ops-console
    restart: always
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./docs/system_teaching:/app/docs/system_teaching
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: wecom-qdrant
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
