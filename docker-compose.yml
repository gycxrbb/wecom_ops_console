version: '3.9'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wecom_ops
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  wecom-ops-console:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/wecom_ops
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./data:/app/data

  celery_worker:
    build: .
    command: celery -A app.celery_app worker -l info
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/wecom_ops
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - wecom-ops-console

  celery_beat:
    build: .
    command: celery -A app.celery_app beat -l info
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/wecom_ops
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  db_data:
